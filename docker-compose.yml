services:
  ukip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ukip
    ports:
      - "8888:80"
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
    networks:
      - app-network

  db:
    image: mariadb:10.5
    container_name: db_ukip
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ukip
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma_ukip
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
